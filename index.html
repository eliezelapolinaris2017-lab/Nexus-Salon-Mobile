<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Nexus Salón V5</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nexus Salón" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="splashScreen" class="splash-screen">
    <div class="splash-logo-wrap">
      <img src="./assets/icons/icon-512.png" alt="Logo Nexus Salón" class="splash-logo" />
      <h1 id="splashBusinessName">Nexus Salón</h1>
    </div>
  </div>

  <div id="app" class="app-shell hidden">
    <section id="pinScreen" class="pin-screen">
      <div class="pin-card glass">
        <div class="brand-lockup center">
          <img src="./assets/icons/icon-192.png" alt="Logo Nexus Salón" class="logo-mark-lg" />
          <div>
            <h1 id="loginBusinessName">Nexus Salón</h1>
          </div>
        </div>

        <div class="pin-block">
          <label for="pinInput">PIN</label>
          <input id="pinInput" inputmode="numeric" maxlength="6" placeholder="0000" />
          <button id="pinBtn" class="primary-btn">Entrar</button>
        </div>
      </div>
    </section>

    <section id="mainShell" class="main-shell hidden">
      <header class="topbar">
        <div class="brand-lockup compact">
          <img src="./assets/icons/icon-192.png" alt="Logo Nexus Salón" class="logo-mark-sm" />
          <div>
            <h1 id="headerBusinessName">Nexus Salón</h1>
          </div>
        </div>
      </header>

      <main class="main-content">
        <section id="view-home" class="view active">
          <section class="hero glass">
            <div class="hero-copy">
              <h2>Dashboard</h2>
            </div>
            <div class="hero-actions">
              <button id="quickAddBtn" class="primary-btn">Nueva cita</button>
            </div>
          </section>

          <section class="metrics-grid">
            <article class="metric-card glass">
              <span>Citas hoy</span>
              <strong id="todayCount">0</strong>
            </article>
            <article class="metric-card glass">
              <span>Estimado</span>
              <strong id="todayRevenue">$0.00</strong>
            </article>
            <article class="metric-card glass">
              <span>Completadas</span>
              <strong id="completedCount">0</strong>
            </article>
            <article class="metric-card glass">
              <span>Cobrado</span>
              <strong id="completedRevenue">$0.00</strong>
            </article>
          </section>

          <section class="kpi-band glass">
            <div class="kpi-item">
              <span>Pendientes</span>
              <strong id="pendingCount">0</strong>
            </div>
            <div class="kpi-item">
              <span>Confirmadas</span>
              <strong id="confirmedCount">0</strong>
            </div>
            <div class="kpi-item">
              <span>No-show</span>
              <strong id="noshowCount">0</strong>
            </div>
          </section>

          <section class="glass panel pad">
            <div class="section-head">
              <h3>Agenda del día</h3>
              <input type="date" id="filterDate" />
            </div>
            <div id="timeline" class="timeline"></div>
          </section>
        </section>

        <section id="view-agenda" class="view">
          <section class="glass panel pad">
            <div class="section-head">
              <h3 id="formTitle">Nueva cita</h3>
            </div>

            <form id="appointmentForm" class="form-grid">
              <input type="hidden" id="appointmentId" />
              <label>
                <span>Cliente</span>
                <input type="text" id="clientName" required placeholder="Nombre del cliente" />
              </label>

              <label>
                <span>Teléfono</span>
                <input type="tel" id="clientPhone" placeholder="787-000-0000" />
              </label>

              <label>
                <span>Servicio</span>
                <select id="service" required></select>
              </label>

              <label>
                <span>Precio</span>
                <input type="number" id="price" required step="0.01" placeholder="0.00" />
              </label>

              <label>
                <span>Fecha</span>
                <input type="date" id="date" required />
              </label>

              <label>
                <span>Hora</span>
                <input type="time" id="time" required />
              </label>

              <label>
                <span>Barbero</span>
                <input type="text" id="barber" placeholder="Nombre del barbero" />
              </label>

              <label>
                <span>Estado</span>
                <select id="status">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Confirmada">Confirmada</option>
                  <option value="Completada">Completada</option>
                  <option value="Cancelada">Cancelada</option>
                  <option value="No-show">No-show</option>
                </select>
              </label>

              <label class="full">
                <span>Notas</span>
                <textarea id="notes" rows="3" placeholder="Notas"></textarea>
              </label>

              <div class="full form-actions">
                <button type="submit" class="primary-btn" id="saveBtn">Guardar cita</button>
                <button type="button" id="resetBtn" class="secondary-btn">Limpiar</button>
              </div>
            </form>
          </section>
        </section>

        <section id="view-clientes" class="view">
          <section class="glass panel pad">
            <div class="section-head">
              <h3>Clientes</h3>
            </div>
            <div id="clientsList" class="list-stack"></div>
          </section>
        </section>

        <section id="view-servicios" class="view">
          <section class="glass panel pad">
            <div class="section-head">
              <h3>Servicios</h3>
            </div>

            <form id="serviceForm" class="form-grid compact-form">
              <input type="hidden" id="serviceId" />
              <label>
                <span>Nombre</span>
                <input type="text" id="serviceName" placeholder="Servicio" required />
              </label>
              <label>
                <span>Precio</span>
                <input type="number" id="servicePrice" placeholder="0.00" step="0.01" required />
              </label>
              <label>
                <span>Duración</span>
                <input type="text" id="serviceTime" placeholder="30 min" required />
              </label>
              <div class="form-actions align-end">
                <button type="submit" class="primary-btn">Guardar</button>
                <button type="button" id="resetServiceBtn" class="secondary-btn">Limpiar</button>
              </div>
            </form>

            <div id="servicesList" class="list-stack"></div>
          </section>
        </section>

        <section id="view-config" class="view">
          <section class="glass panel pad">
            <div class="section-head">
              <h3>Configuración</h3>
            </div>

            <form id="settingsForm" class="form-grid">
              <label class="full">
                <span>Nombre del negocio</span>
                <input type="text" id="businessName" placeholder="Nexus Salón" />
              </label>
              <label class="full">
                <span>PIN de acceso</span>
                <input type="text" id="businessPin" maxlength="6" inputmode="numeric" placeholder="0000" />
              </label>
              <div class="full form-actions">
                <button type="submit" class="primary-btn">Guardar configuración</button>
              </div>
            </form>
          </section>
        </section>
      </main>

      <nav class="bottom-nav glass">
        <button class="nav-btn active" data-view="home">Home</button>
        <button class="nav-btn" data-view="agenda">Agenda</button>
        <button class="nav-btn" data-view="clientes">Clientes</button>
        <button class="nav-btn" data-view="servicios">Servicios</button>
        <button class="nav-btn" data-view="config">Config</button>
      </nav>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
